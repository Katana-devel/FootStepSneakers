{% extends 'footstepsneakers/base.html' %}

{% block body %}
<div class="container mt-5" style="max-width: 640px;">
    <h2 class="mb-4 fw-bold">List a New Pair</h2>

    <form action="{% url 'product:upload' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="card p-4 shadow-sm mb-4">

            <div class="mb-3">
                <label for="brand" class="form-label fw-semibold">Brand</label>
                <div class="input-group">
                    <select name="brand" id="brand" class="form-select">
                        <option value="" disabled selected>Select a brand</option>
                        <option value="Nike">Nike</option>
                        <option value="Adidas">Adidas</option>
                        <option value="Puma">Puma</option>
                        <option value="New Balance">New Balance</option>
                        <option value="Reebok">Reebok</option>
                        <option value="Asics">Asics</option>
                        <option value="Vans">Vans</option>
                        <option value="Converse">Converse</option>
                        <option value="Under Armour">Under Armour</option>
                    </select>
                    <span class="input-group-text text-muted">or</span>
                    <input type="text" name="custom_brand" class="form-control" placeholder="Enter custom brand">
                </div>
            </div>

            <div class="mb-3">
                <label for="model" class="form-label fw-semibold">Model</label>
                <input type="text" name="model" id="model" class="form-control" placeholder="e.g. Air Max 90" required>
            </div>

            <div class="mb-3">
                <label for="color" class="form-label fw-semibold">Color</label>
                <div class="input-group">
                    <select name="color" id="color" class="form-select">
                        <option value="" disabled selected>Select a color</option>
                        <option value="Black">Black</option>
                        <option value="White">White</option>
                        <option value="Red">Red</option>
                        <option value="Blue">Blue</option>
                        <option value="Green">Green</option>
                        <option value="Grey">Grey</option>
                        <option value="Yellow">Yellow</option>
                        <option value="Pink">Pink</option>
                    </select>
                    <span class="input-group-text text-muted">or</span>
                    <input type="text" name="custom_color" class="form-control" placeholder="Enter custom color">
                </div>
            </div>

            <div class="mb-3">
                <label for="price" class="form-label fw-semibold">Price ($)</label>
                <input type="number" name="price" id="price" class="form-control" placeholder="e.g. 120" min="1" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label fw-semibold">Description</label>
                <textarea name="description" id="description" class="form-control" rows="3"
                          placeholder="Describe the condition, size, etc." required></textarea>
            </div>

            <div class="mb-3">
                <label for="path" class="form-label fw-semibold">Photo</label>
                <input type="file" name="path" id="path" class="form-control" accept="image/*" required>
                <div class="text-danger small mt-1">{{ form.errors.path }}</div>
            </div>

            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="is_public" name="is_public" value="True">
                <label class="form-check-label" for="is_public">Make this listing public</label>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Upload</button>
            <button type="reset" class="btn btn-outline-secondary">Reset</button>
        </div>
    </form>
</div>
{% endblock %}
