{% extends 'footstepsneakers/base.html' %}

{% block body %}
<div class="container mt-5" style="max-width: 600px;">
    <h2 class="mb-4 fw-bold">Edit Listing</h2>

    <form action="{% url 'product:edit' pic.id %}" method="post">
        {% csrf_token %}

        <div class="card p-4 shadow-sm mb-4">
            {% if pic.path %}
            <img src="{{ pic.path.url }}" class="img-fluid rounded mb-4"
                 style="max-height: 300px; object-fit: cover;" alt="Sneaker">
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Brand</label>
                <input type="text" name="brand" class="form-control" value="{{ pic.sneakers.brand }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Model</label>
                <input type="text" name="model" class="form-control" value="{{ pic.sneakers.model }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Color</label>
                <input type="text" name="color" class="form-control" value="{{ pic.sneakers.color }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Price ($)</label>
                <input type="number" name="price" class="form-control" value="{{ pic.sneakers.price }}">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ pic.sneakers.description }}</textarea>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'product:pictures' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
